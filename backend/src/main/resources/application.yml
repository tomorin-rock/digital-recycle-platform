# 数据库连接
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/digitalRecycle
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

# 服务端口
server:
  port: 1000

# 分页插件
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# MyBatis
mybatis:
  mapper-locations: classpath:Mapper/*.xml
  type-aliases-package: com.demo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开启 SQL 日志

# 文件上传配置
file:
  upload:
    base-path: ./uploads/
    allowed-types: jpg,jpeg,png,gif,webp
    max-file-size: 5
    max-request-size: 10
    access-path: /uploads/**
